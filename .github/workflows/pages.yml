name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
      # Also build the active feature branch so we can preview before merge.
      # Only the latest run for a branch is kept (concurrency below).
      - 'claude/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build site
        env:
          # Replace 'PolyChrome' if the repo is renamed.
          PC_PUBLISH_BASE: /PolyChrome/
        run: bash scripts/build-gh-pages.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages-out

  deploy:
    needs: build
    # Only deploy from the default branch. Feature branches build but don't
    # publish — that's intentional so a preview build doesn't clobber prod.
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
